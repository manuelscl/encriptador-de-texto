<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts 'Inter' -->
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700&display=swap" rel="stylesheet">

    <!-- Styles CSS -->
    <link rel="stylesheet" href="./CSS/styles.css">

    <title>Encriptador de texto</title>
</head>
<body>
    <header>
        <nav class="navbar-menu">
            <h1 class="logo-container">
                <a href="#">
                    <img class="logo-img" src="./images/alura-logo.svg" alt="Logo alura">
                </a>
            </h1>
        </nav>
    </header>
    <main>
        <section class="encrypter-container">
            <div class="encrypter-content">
                <textarea name="textArea-ed" class="textArea-ed" id="textArea-ed" cols="30" rows="10" placeholder="Inserta el texto aquí..."></textarea>
                <div class="encrypter-bottom">
                    <p class="info">
                        <img src="./images/info-icon.svg" alt="">
                        Solo letras minúsculas y sin tíldes
                    </p>
                    <div class="btns-container">
                        <button class="btns btn--blue" id="btn-encrypt">Encriptar</button>
                        <button class="btns btn--no-bg" id="btn-decrypt">Desencriptar</button>
                    </div>
                </div>
            </div>
            <div class="encrypter-message">
                <div class="message">
                    <input type="text" class="message-ed" id="message-ed">
                    <img class="illustration-flat" src="./images/ilustracion-flat.svg" alt="ilustración-flat">
                    <h2 class="no-message-title">Ningún mensaje fue encontrado</h2>
                    <p class="no-message-description">Ingresa el texto que deseas encriptar o desencriptar</p>
                    <button class="btns btn-copy" id="btn-copy">Copiar</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let textArea = document.querySelector('#textArea-ed');
        let btnEncriptar = document.querySelector('#btn-encrypt');
        let btnDesencriptar = document.querySelector('#btn-decrypt');
        let btnCopiar = document.querySelector('#btn-copy');
        let mostrarMensaje = document.querySelector('#message-ed');

        btnEncriptar.addEventListener('click', encriptarMensaje);
        btnDesencriptar.addEventListener('click', desencriptarMensaje);
        btnCopiar.addEventListener('click', copiarMensaje);

        function esMayuscula(letra) {
            return letra === letra.toUpperCase();
        }

        function encriptarMensaje() {
            let mensajeTextArea = textArea.value;
            let mensajeEncriptado = "";
            let posicionActual;

            for(let i = 0; i < mensajeTextArea.length; i++) {
                posicionActual = mensajeTextArea.charAt(i);

                if(esMayuscula(posicionActual)) {
                    alert("No debes escribir el texto en mayúsculas");
                    textArea.value = "";
                    return;
                }

                if(posicionActual === "a") {
                    posicionActual = "ai";
                } else if(posicionActual === "e") {
                    posicionActual = "enter";
                } else if(posicionActual === "i") {
                    posicionActual = "imes";
                } else if(posicionActual === "o") {
                    posicionActual = "ober";
                } else if(posicionActual === "u") {
                    posicionActual = "ufat";
                }
                mensajeEncriptado += posicionActual;
                // mensajeEncriptado = h
                // mensajeEncriptado = hober
                // mensajeEncriptado = hoberl
                // mensajeEncriptado = hoberlai
            }
            
            btnCopiar.classList.add('active');
            mostrarMensaje.classList.add('active');
            mostrarMensaje.value = mensajeEncriptado;
        }

        function desencriptarMensaje() {
            let mensajeTextArea = textArea.value;
            let mensaje = mensajeTextArea;
            let posicionActual;

            for(let i = 0; i < mensajeTextArea.length; i++) {
                posicionActual = mensajeTextArea.charAt(i);

                if(esMayuscula(posicionActual)) {
                    alert("No debes escribir el texto en mayúsculas");
                    textArea.value = "";
                    return;
                }
            }

            let remplazo = mensaje.replaceAll('ai', 'a');
            mensaje = remplazo;

            remplazo = mensaje.replaceAll('enter', 'e');
            mensaje = remplazo;

            remplazo = mensaje.replaceAll('imes', 'i');
            mensaje = remplazo;

            remplazo = mensaje.replaceAll('ober', 'o');
            mensaje = remplazo;

            remplazo = mensaje.replaceAll('ufat', 'u');
            mensaje = remplazo;

            console.log(mensaje)
            
            btnCopiar.classList.add('active');
            mostrarMensaje.classList.add('active');
            mostrarMensaje.value = mensaje;
            textArea.value = "";
        }

        function copiarMensaje() {
            let copiarTexto = mostrarMensaje;
            copiarTexto.select();
            copiarTexto.setSelectionRange(0, 1000);

            navigator.clipboard.writeText(copiarTexto.value).then(() =>{
                alert("copiado exitosamente");
            })
            .catch(() => {
                alert("something went wrong");
            });
        }
    </script>
</body>
</html>
