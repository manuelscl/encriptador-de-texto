<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador de texto</title>
</head>
<body>
    <header>
        <nav>
            <h1>
                <a href="#">
                    <img src="./images/alura-logo.svg" alt="Logo alura">
                </a>
            </h1>
        </nav>
    </header>
    <main>
        <section class="encrypter-container">
            <div class="encrypter-content">
                <textarea name="textArea-ed" id="textArea-ed" cols="30" rows="10" placeholder="Inserta el texto aquí..."></textarea>
                <div class="encrypter-bottom">
                    <p class="info">
                        <img src="./images/info-icon.svg" alt="">
                        Solo letra minúsculas y sin tíldes
                    </p>
                    <div class="btns-container">
                        <button class="btns btn--blue">Encriptar</button>
                        <button class="btns btn--no-bg">Desencriptar</button>
                    </div>
                </div>
            </div>
            <div class="encrypter-message">
                <div class="message">
                    <input type="text" class="message-ed" id="message-ed">
                    <h2 class="no-message-title">Ningún mensaje fue encontrado</h2>
                    <p class="no-message-description">Ingresa el mensaje que deseas encriptar o desencriptar</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
